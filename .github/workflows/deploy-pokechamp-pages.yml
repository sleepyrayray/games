name: Deploy Games Pages

on:
  push:
    branches:
      - main
    paths:
      - "pokechamp/**"
      - "whosthespy/**"
      - ".github/workflows/deploy-pokechamp-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            pokechamp/package-lock.json
            whosthespy/package-lock.json

      - name: Install PokeChamp dependencies
        working-directory: pokechamp
        run: npm ci

      - name: Install Who's the Spy? dependencies
        working-directory: whosthespy
        run: npm ci

      - name: Build PokeChamp
        working-directory: pokechamp
        run: npm run build

      - name: Build Who's the Spy?
        working-directory: whosthespy
        run: npm run build

      - name: Prepare Pages artifact
        run: |
          mkdir -p site/pokechamp
          mkdir -p site/whosthespy
          cp -R pokechamp/dist/. site/pokechamp/
          cp -R whosthespy/dist/. site/whosthespy/
          cat > site/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta http-equiv="refresh" content="0; url=/games/pokechamp/" />
              <title>PokeChamp Redirect</title>
            </head>
            <body>
              <p>Redirecting to <a href="/games/pokechamp/">/games/pokechamp/</a>...</p>
            </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
