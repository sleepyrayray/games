name: Deploy Games Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            */package-lock.json

      - name: Build apps and prepare Pages artifact
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          mkdir -p site
          app_count=0
          app_links=""

          for dir in */ ; do
            app="${dir%/}"

            if [ ! -f "$app/package.json" ] || [ ! -f "$app/package-lock.json" ] || [ ! -f "$app/vite.config.ts" ]; then
              continue
            fi

            echo "::group::Build $app"
            (
              cd "$app"
              npm ci
              npm run build
            )

            if [ ! -d "$app/dist" ]; then
              echo "Expected $app/dist after building $app."
              exit 1
            fi

            mkdir -p "site/$app"
            cp -R "$app/dist/." "site/$app/"
            app_links="${app_links}        <li><a href=\"/games/$app/\">$app</a></li>\n"
            app_count=$((app_count + 1))
            echo "::endgroup::"
          done

          if [ "$app_count" -eq 0 ]; then
            echo "No deployable game apps found."
            exit 1
          fi

          cat > site/index.html <<EOF
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>Games</title>
              <style>
                :root {
                  color-scheme: light;
                  font-family: "Segoe UI", sans-serif;
                  color: #182018;
                  background: #e9e4d8;
                }
                * { box-sizing: border-box; }
                body {
                  margin: 0;
                  min-height: 100vh;
                  display: grid;
                  place-items: center;
                  padding: 2rem 1rem;
                  background:
                    radial-gradient(circle at top, rgba(255, 255, 255, 0.92), transparent 34%),
                    linear-gradient(180deg, #e9e4d8 0%, #d7cfbf 100%);
                }
                main {
                  width: min(100%, 34rem);
                  padding: 1.5rem;
                  border-radius: 1.5rem;
                  background: rgba(251, 249, 243, 0.92);
                  border: 1px solid rgba(24, 32, 24, 0.08);
                  box-shadow: 0 1rem 2.2rem rgba(67, 61, 45, 0.12);
                }
                h1 {
                  margin: 0 0 0.75rem;
                  font-size: 2rem;
                  text-align: center;
                }
                p {
                  margin: 0 0 1rem;
                  text-align: center;
                  color: #495046;
                }
                ul {
                  margin: 0;
                  padding: 0;
                  list-style: none;
                  display: grid;
                  gap: 0.75rem;
                }
                a {
                  display: block;
                  padding: 0.95rem 1rem;
                  border-radius: 1rem;
                  background: #f4efe3;
                  border: 1px solid rgba(24, 32, 24, 0.08);
                  color: #182018;
                  text-decoration: none;
                  font-weight: 700;
                  text-transform: capitalize;
                  text-align: center;
                }
              </style>
            </head>
            <body>
              <main>
                <h1>Games</h1>
                <p>Select a project.</p>
                <ul>
          $(printf "%b" "$app_links")
                </ul>
              </main>
            </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
