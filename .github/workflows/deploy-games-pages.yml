name: Deploy Games Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            */package-lock.json

      - name: Build apps and prepare Pages artifact
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          mkdir -p site
          cp -R pages/. site/
          app_count=0

          for dir in */ ; do
            app="${dir%/}"

            if [ ! -f "$app/package.json" ] || [ ! -f "$app/package-lock.json" ] || [ ! -f "$app/vite.config.ts" ]; then
              continue
            fi

            echo "::group::Build $app"
            (
              cd "$app"
              npm ci
              npm run build
            )

            if [ ! -d "$app/dist" ]; then
              echo "Expected $app/dist after building $app."
              exit 1
            fi

            mkdir -p "site/$app"
            cp -R "$app/dist/." "site/$app/"
            app_count=$((app_count + 1))
            echo "::endgroup::"
          done

          if [ "$app_count" -eq 0 ]; then
            echo "No deployable game apps found."
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
